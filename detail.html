<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Détail — Immocongo</title>
  <meta name="description" content="Détails du bien immobilier — Immocongo" />

  <!-- Font Awesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" referrerpolicy="no-referrer" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />

  <style>
    .detail-wrap{
      padding-top:86px;
      padding-bottom:56px;
    }
    .detail-grid{
      display:grid;
      grid-template-columns: 1.1fr .9fr;
      gap:18px;
      align-items:start;
    }
    @media (max-width: 900px){
      .detail-grid{grid-template-columns:1fr}
    }

    .detail-panel{
      background: rgba(255,255,255,.85);
      border:1px solid rgba(232,217,181,.95);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:16px;
    }

    .detail-gallery{
      background:#0F0F12;
      border-radius: 18px;
      overflow:hidden;
      border: 1px solid rgba(232,217,181,.20);
    }
    .detail-gallery img{
      width:100%;
      height:420px;
      object-fit:cover;
    }
    @media (max-width: 640px){
      .detail-gallery img{height:240px}
    }

    .detail-thumbs{
      display:flex;
      gap:10px;
      padding:12px;
      background: rgba(0,0,0,.25);
      overflow:auto;
    }
    .detail-thumb{
      width:88px;
      height:60px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.18);
      cursor:pointer;
      opacity:.85;
      object-fit:cover;
    }
    .detail-thumb.active{opacity:1; border-color: #C9A84C}

    .urgent-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      font-weight:900;
      background: rgba(253,126,20,.14);
      border: 1px solid rgba(253,126,20,.35);
      color: #FFE9C7;
      margin-bottom:12px;
    }

    .meta-line{
      color: var(--muted);
      font-weight:900;
      font-size:14px;
      margin:8px 0 10px;
    }

    .price-line{
      font-weight:900;
      font-size:22px;
      margin:8px 0 14px;
      color: var(--text);
    }

    .facts-grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
      margin-top:14px;
    }
    @media (max-width: 640px){
      .facts-grid{grid-template-columns:1fr}
    }
    .fact{
      background: rgba(248,245,239,.85);
      border:1px solid rgba(232,217,181,.95);
      border-radius: 16px;
      padding:12px;
    }
    .fact b{display:block; color: var(--text); margin-bottom:4px}
    .fact span{color: var(--muted); font-weight:800; font-size:13px}

    .detail-desc{
      color: var(--muted);
      font-weight:750;
      line-height:1.7;
      white-space:pre-wrap;
      margin-top:10px;
    }

    .actions-stack{display:flex; gap:10px; flex-wrap:wrap; margin-top:14px}

    .btn-back{
      background: transparent;
      border:1px solid var(--accent);
      color: var(--accent);
    }
    .btn-back:hover{background: var(--accent); color:#fff}

    .btn-whatsapp{
      background: #25D366;
      border:1px solid rgba(255,255,255,.18);
      color:#fff;
      box-shadow:0 0 20px rgba(37,211,102,0.35);
    }

    .btn-whatsapp:hover{filter: brightness(1.02)}

    .gallery-empty{
      height:420px;
      display:flex;
      align-items:center;
      justify-content:center;
      color: rgba(255,255,255,.7);
      font-weight:900;
    }
    @media (max-width: 640px){.gallery-empty{height:240px}}
  </style>
</head>
<body>
  <header class="site-header" id="siteHeader">
    <div class="container nav-inner">
      <a class="brand" href="index.html#biens" aria-label="Retour">
        <div class="brand-logo" aria-hidden="true"><img src="image Immocongo.jpeg" alt="" /></div>
      </a>
      <div class="nav-right">
        <a class="btn btn-outline" href="index.html#biens"><i class="fa-solid fa-arrow-left" aria-hidden="true"></i> Retour</a>
      </div>
    </div>
  </header>

  <main class="detail-wrap">
    <div class="container">
      <div id="detailTopMsg" class="fineprint" style="margin-bottom:12px; display:none"></div>

      <div class="detail-grid">
        <section class="detail-gallery" aria-label="Galerie du bien">
          <div id="detailGalleryEmpty" class="gallery-empty" style="display:none">
            Image indisponible
          </div>
          <img id="detailMainImg" src="" alt="" style="display:none" />
          <div id="detailThumbs" class="detail-thumbs" style="display:none"></div>
        </section>

        <aside class="detail-panel" aria-label="Détails">
          <div id="urgentBadgeWrap" style="display:none">
            <div class="urgent-badge"><i class="fa-solid fa-bolt" aria-hidden="true"></i> URGENT</div>
          </div>

          <h1 id="detailTitle" style="margin:0; font-size:26px; letter-spacing:-.01em"></h1>
          <div class="meta-line" id="detailMeta"></div>
          <div class="price-line" id="detailPrice"></div>

          <div class="facts-grid">
            <div class="fact"><b><i class="fa-solid fa-bed" aria-hidden="true"></i> Chambres</b><span id="detailChambres">—</span></div>
            <div class="fact"><b><i class="fa-solid fa-bath" aria-hidden="true"></i> Salles de bain</b><span id="detailSdb">—</span></div>
            <div class="fact"><b><i class="fa-solid fa-ruler-combined" aria-hidden="true"></i> Surface</b><span id="detailSurface">—</span></div>
            <div class="fact"><b><i class="fa-solid fa-user-group" aria-hidden="true"></i> Capacité</b><span id="detailCap">—</span></div>
          </div>

          <div style="margin-top:14px">
            <div class="section-title" style="margin:0 0 10px">
              <h2 style="font-size:18px; margin:0">Description</h2>
            </div>
            <div class="detail-desc" id="detailDesc"></div>
          </div>

          <div class="actions-stack">
            <a id="btnWhatsAppInfo" class="btn btn-whatsapp" href="#" target="_blank" rel="noopener">
              <i class="fa-brands fa-whatsapp" aria-hidden="true"></i> Contacter via WhatsApp
            </a>
            <a id="btnWhatsAppVisit" class="btn btn-whatsapp" href="#" target="_blank" rel="noopener">
              <i class="fa-solid fa-calendar-check" aria-hidden="true"></i> Demander une visite
            </a>
            <a class="btn btn-back" href="index.html#biens">
              <i class="fa-solid fa-arrow-left" aria-hidden="true"></i> Retour à la liste
            </a>
          </div>
        </aside>
      </div>
    </div>
  </main>

  <script>
    (() => {
      const STORAGE_ANNOUNCEMENTS = 'immocongo_announcements';
      const STORAGE_SELECTED_ID = 'immocongo_selected_property_id';

      const qs = (sel) => document.querySelector(sel);
      const readJSON = (key, fallback) => {
        try {
          const raw = localStorage.getItem(key);
          if (!raw) return fallback;
          return JSON.parse(raw);
        } catch {
          return fallback;
        }
      };

      const normalizePrice = (v) => {
        const n = Number(String(v || '').replace(/[^0-9.]/g, ''));
        return Number.isFinite(n) ? n : null;
      };

      const formatXAF = (price) => {
        const n = normalizePrice(price);
        if (n === null) return '';
        try {
          return new Intl.NumberFormat('fr-FR').format(n);
        } catch {
          return String(n);
        }
      };

      const getId = () => localStorage.getItem(STORAGE_SELECTED_ID) || '';

      const id = getId();
      const msgEl = qs('#detailTopMsg');
      if (!id) {
        msgEl.style.display = 'block';
        msgEl.textContent = "Aucun bien sélectionné.";
        return;
      }

      const all = readJSON(STORAGE_ANNOUNCEMENTS, []);
      const ann = (all || []).find((x) => String(x.id) === String(id));

      if (!ann) {
        msgEl.style.display = 'block';
        msgEl.textContent = "Bien introuvable.";
        return;
      }

      const setText = (sel, v) => {
        const el = qs(sel);
        if (!el) return;
        el.textContent = v;
      };

      const images = Array.isArray(ann.images) && ann.images.length ? ann.images : [];
      const mainImg = qs('#detailMainImg');
      const empty = qs('#detailGalleryEmpty');
      const thumbs = qs('#detailThumbs');

      if (images.length) {
        mainImg.src = images[0];
        mainImg.style.display = 'block';
        thumbs.style.display = 'flex';
        thumbs.innerHTML = '';
        images.slice(0, 10).forEach((src, idx) => {
          const im = document.createElement('img');
          im.src = src;
          im.alt = 'Photo ' + (idx + 1);
          im.className = 'detail-thumb' + (idx === 0 ? ' active' : '');
          im.addEventListener('click', () => {
            thumbs.querySelectorAll('.detail-thumb').forEach((t) => t.classList.remove('active'));
            im.classList.add('active');
            mainImg.src = src;
          });
          thumbs.appendChild(im);
        });
      } else {
        empty.style.display = 'flex';
      }

      const typeLabel = ann.type === 'location' ? 'Location' : 'Vente';
      setText('#detailTitle', ann.title || '—');
      setText('#detailMeta', `${ann.area || ''} • ${typeLabel}`.trim());
      setText('#detailPrice', ann.price ? `${formatXAF(ann.price)} XAF` : '');

      setText('#detailChambres', ann.chambres ?? 0);
      setText('#detailSdb', ann.sallesDeBain ?? 0);
      setText('#detailSurface', `${ann.surface ?? 0} m²`);
      setText('#detailCap', ann.capacite ?? 0);

      qs('#detailDesc').textContent = ann.description || '';

      // URGENT badge
      const urgentWrap = qs('#urgentBadgeWrap');
      urgentWrap && (urgentWrap.style.display = ann.urgent === true ? 'block' : 'none');

      // WhatsApp buttons
      const whatsappNumber = '+242056145113';
      const titre = ann.title || '';
      const priceText = ann.price ? `${formatXAF(ann.price)} XAF` : '';
      const baseMsg = `Bonjour, je souhaite plus d’informations sur : ${titre}. ${priceText}`.trim();

      const waInfo = `https://wa.me/242056145113?text=${encodeURIComponent(baseMsg)}`;
      const waVisit = `https://wa.me/242056145113?text=${encodeURIComponent(`Bonjour, je souhaite demander une visite pour : ${titre}. (${ann.area || ''} — ${typeLabel})`)}`;

      const btnInfo = qs('#btnWhatsAppInfo');
      const btnVisit = qs('#btnWhatsAppVisit');
      if (btnInfo) btnInfo.href = waInfo;
      if (btnVisit) btnVisit.href = waVisit;
    })();
  </script>
</body>
</html>
